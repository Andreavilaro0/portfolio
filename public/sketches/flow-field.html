<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>p5.brush — Flow Field</title>
  <script src="https://cdn.jsdelivr.net/npm/p5@2/lib/p5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/p5.brush@2.0.0-beta"></script>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #F5F0E8; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
function setup() {
  createCanvas(800, 800, WEBGL);
  brush.load();
  translate(-width / 2, -height / 2);

  background(245, 240, 232);
  randomSeed(99);

  // Waves field for flowing lines
  brush.field("waves");

  let palette = ["#4a4a4a", "#8B8680", "#C4BFB5", "#6B6560"];

  // Abstract flowing pencil lines
  brush.scaleBrushes(1.2);
  for (let i = 0; i < 120; i++) {
    let x = random(width);
    let y = random(height);
    let col = random(palette);
    brush.set("cpencil", col, random(0.3, 0.8));
    brush.flowLine(x, y, random(60, 300), random(TWO_PI));
  }

  // Lighter overlay pass
  brush.field("curved");
  for (let i = 0; i < 40; i++) {
    let x = random(width);
    let y = random(height);
    brush.set("2H", random(palette), random(0.2, 0.5));
    brush.flowLine(x, y, random(100, 250), random(TWO_PI));
  }
}
</script>
</body>
</html>
